version: "3.9"

# Named volume for Redis persistence so data survives container recreation.
volumes:
  redis_data:

# Shared restart policy used by all application services.
x-restart: &restart
  restart: unless-stopped

networks:
  zentora_net:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  redis-zentora:
    <<: *restart
    image: redis:7-alpine
    container_name: redis-zentora
    networks:
      - zentora_net
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    # Expose Redis only on the internal network in production.
    # Remove the ports block if you do not need local access.
    ports:
      - "127.0.0.1:6379:6379"
    # healthcheck:
    #   test: ["CMD", "redis-cli", "ping"]
    #   interval: 60s
    #   timeout: 3s
    #   retries: 3

  # ---------------------------------------------------------------------------
  # Zentora API
  # ---------------------------------------------------------------------------
  zentora:
    <<: *restart
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zentora
    networks:
      - zentora_net
    env_file:
      - .env
    volumes:
      # Read-only mounts — content is baked into the image but overridable.
      - ./secrets:/app/secrets:ro
      - ./static:/app/static:ro
      # Uploads are writable and must persist across container restarts.
      # Images saved by the API land here and are served via GET /uploads/...
      - ./uploads:/app/uploads
    depends_on:
      redis-zentora:
        condition: service_healthy
    ports:
      - "8002:8002"
    # Give the container a hard memory ceiling to prevent OOM-killing the host.
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m
    # Use the /health endpoint baked into the app for liveness checks.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health"]
      interval: 5m
      timeout: 3s
      start_period: 15s
      retries: 3
    # Log rotation so the container does not fill the disk.
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"